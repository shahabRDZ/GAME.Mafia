services:
  db:
    image: postgres:16-alpine
    container_name: mafia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mafia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mafia123}
      POSTGRES_DB: ${POSTGRES_DB:-mafiadb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mafia} -d ${POSTGRES_DB:-mafiadb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    networks:
      - mafia-net

  web:
    build: .
    container_name: mafia_web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mafia}:${POSTGRES_PASSWORD:-mafia123}@db:5432/${POSTGRES_DB:-mafiadb}
      JWT_SECRET: ${JWT_SECRET:-ShowShung-mafia-jwt-secret-2026-stable-key-do-not-change}
    ports:
      - "${WEB_PORT:-5001}:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    networks:
      - mafia-net

volumes:
  pgdata:

networks:
  mafia-net:
    driver: bridge
