<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مافیا</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap');

:root {
  --dark:#06060f; --dark2:#0d0d1a; --dark3:#13132a;
  --accent:#e94560; --accent2:#f5a623;
  --neon-red:#ff2244; --neon-green:#00ff88; --neon-blue:#00cfff;
  --glass:rgba(255,255,255,0.04); --gb:rgba(255,255,255,0.07);
  --text:#eaeaf5; --dim:rgba(255,255,255,0.38);
}

*{margin:0;padding:0;box-sizing:border-box}

body{font-family:'Vazirmatn',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Aurora ── */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbF var(--d) ease-in-out infinite;opacity:.12}
@keyframes orbF{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(var(--tx),var(--ty)) scale(1.15)}70%{transform:translate(calc(var(--tx)*-.6),calc(var(--ty)*1.4)) scale(.88)}}

/* ── Stars ── */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twk var(--dur) ease-in-out infinite;opacity:0}
@keyframes twk{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:.9;transform:scale(1)}}

/* ── Layout ── */
.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:16px 20px}

/* ── Header ── */
header{text-align:center;padding:32px 0 18px}
.logo{font-size:clamp(3rem,9vw,6.5rem);font-weight:900;letter-spacing:-4px;
  background:linear-gradient(120deg,#ff2244 0%,#ff7700 40%,#f5a623 60%,#ff2244 100%);
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shine 4s linear infinite;
  filter:drop-shadow(0 0 50px rgba(255,34,68,.55))}
@keyframes shine{to{background-position:200% center}}
.logo-sub{font-size:.9rem;color:var(--dim);letter-spacing:6px;margin-top:6px;text-transform:uppercase}

/* ── Glassmorphism card ── */
.gc{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--gb);border-radius:22px;
  box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05)}

/* ── Auth bar ── */
.auth-bar{display:flex;align-items:center;gap:10px;padding:10px 18px;margin-bottom:16px}
.auth-bar .user-info{flex:1;display:flex;align-items:center;gap:10px}
.auth-bar .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0}
.auth-bar .username{font-weight:700;font-size:.95rem}
.auth-bar .games-count{font-size:.72rem;color:var(--dim)}
.auth-bar .guest-msg{flex:1;font-size:.82rem;color:var(--dim)}
.ab-btn{padding:8px 18px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:700;transition:all .2s}
.btn-login{background:var(--accent);color:#fff}
.btn-login:hover{background:#c0392b;transform:translateY(-1px)}
.btn-register{background:rgba(255,255,255,.07);color:rgba(255,255,255,.75);border:1px solid var(--gb)}
.btn-register:hover{background:rgba(255,255,255,.12)}
.btn-logout{background:rgba(255,255,255,.04);color:var(--dim);border:1px solid rgba(255,255,255,.06)}
.btn-logout:hover{background:rgba(233,69,96,.15);color:var(--accent)}

/* ── Nav ── */
.nav{display:flex;justify-content:center;gap:8px;margin:14px 0;flex-wrap:wrap}
.nav-btn{padding:9px 22px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);
  color:var(--dim);border-radius:50px;cursor:pointer;font-family:inherit;font-size:.88rem;transition:all .3s}
.nav-btn:hover,.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;
  box-shadow:0 0 24px rgba(233,69,96,.45)}

/* ── Screens ── */
.screen{display:none;animation:fadeIn .4s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── Setup ── */
.setup-card{padding:28px 30px;margin-bottom:18px}
.section-title{font-size:1rem;font-weight:700;color:var(--accent2);margin-bottom:16px;
  display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}

.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.group-btn{padding:16px 12px;border:2px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.03);border-radius:16px;cursor:pointer;
  text-align:center;transition:all .3s;font-family:inherit;color:var(--text);position:relative;overflow:hidden}
.group-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.03));opacity:0;transition:.3s}
.group-btn:hover::before{opacity:1}
.group-btn .icon{font-size:1.9rem;margin-bottom:7px;display:block}
.group-btn .name{font-size:.95rem;font-weight:700;display:block}
.group-btn .desc{font-size:.68rem;color:var(--dim);margin-top:3px;display:block}
.group-btn:hover{border-color:var(--accent);background:rgba(233,69,96,.08);transform:translateY(-4px);box-shadow:0 8px 28px rgba(233,69,96,.22)}
.group-btn.selected{border-color:var(--accent);background:rgba(233,69,96,.14);box-shadow:0 0 28px rgba(233,69,96,.3)}

.count-grid{display:flex;gap:12px;flex-wrap:wrap}
.count-btn{flex:1;min-width:90px;padding:16px;border:2px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.03);border-radius:16px;cursor:pointer;
  text-align:center;transition:all .3s;font-family:inherit;color:var(--text)}
.count-btn .number{font-size:2.2rem;font-weight:900;display:block;line-height:1}
.count-btn .label{font-size:.7rem;color:var(--dim);margin-top:5px;display:block}
.count-btn .breakdown{font-size:.67rem;margin-top:7px;display:block}
.count-btn .breakdown .m{color:var(--accent)}
.count-btn .breakdown .c{color:#4ade80}
.count-btn:hover,.count-btn.selected{border-color:var(--accent2);background:rgba(245,166,35,.1);
  transform:translateY(-4px);box-shadow:0 8px 24px rgba(245,166,35,.2)}

/* Custom form */
.custom-form{display:none;margin-top:16px;padding:20px;background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.07);border-radius:16px;animation:fadeIn .3s ease}
.custom-form.show{display:block}
.form-group{margin-bottom:0}
.form-group label{display:block;font-size:.76rem;color:var(--dim);margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.13);border-radius:10px;color:#fff;
  font-family:inherit;font-size:.95rem;outline:none;transition:border-color .3s}
.form-group input:focus{border-color:var(--accent2)}
.card-builder-row{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-top:16px}
.card-builder-row input{flex:1;min-width:130px;padding:11px 14px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.13);border-radius:10px;color:#fff;
  font-family:inherit;font-size:.95rem;outline:none;transition:border-color .3s}
.card-builder-row input:focus{border-color:var(--accent2)}
.team-toggle{display:flex;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1);flex-shrink:0}
.team-toggle button{padding:10px 14px;border:none;cursor:pointer;font-family:inherit;font-size:.8rem;
  font-weight:700;background:rgba(255,255,255,.05);color:var(--dim);transition:all .2s}
.team-toggle button.active-mafia{background:rgba(233,69,96,.3);color:#ff7777}
.team-toggle button.active-citizen{background:rgba(74,222,128,.2);color:#4ade80}
.add-card-btn{padding:11px 16px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--accent2),#e67e22);color:#1a0a00;
  font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.add-card-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(245,166,35,.4)}
.custom-cards-list{margin-top:14px;display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.custom-card-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:9px;animation:fadeIn .25s ease}
.custom-card-item.mafia-item{background:rgba(233,69,96,.1);border:1px solid rgba(233,69,96,.2)}
.custom-card-item.citizen-item{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.15)}
.custom-card-item .item-icon{font-size:1rem;flex-shrink:0}
.custom-card-item .item-name{flex:1;font-size:.86rem;font-weight:600}
.custom-card-item.mafia-item .item-name{color:#ff9999}
.custom-card-item.citizen-item .item-name{color:#86efac}
.custom-card-item .item-team{font-size:.7rem;color:var(--dim);flex-shrink:0}
.custom-card-item .item-del{background:none;border:none;color:rgba(255,255,255,.22);cursor:pointer;
  font-size:.95rem;padding:2px 6px;border-radius:6px;transition:all .2s;flex-shrink:0}
.custom-card-item .item-del:hover{background:rgba(233,69,96,.2);color:var(--accent)}
.custom-summary{display:flex;gap:12px;align-items:center;justify-content:center;
  margin-top:12px;padding:11px;background:rgba(255,255,255,.03);
  border-radius:10px;border:1px solid rgba(255,255,255,.06);font-size:.82rem;flex-wrap:wrap}
.custom-summary .cs-total{color:rgba(255,255,255,.6);font-weight:700}
.custom-summary .cs-mafia{color:#ff7777;font-weight:700}
.custom-summary .cs-citizen{color:#4ade80;font-weight:700}
.custom-empty{text-align:center;color:var(--dim);font-size:.8rem;padding:16px 0}

/* ── Start btn ── */
.start-btn{width:100%;padding:17px;background:linear-gradient(135deg,#e94560,#c0392b);
  border:none;border-radius:16px;color:#fff;font-family:inherit;font-size:1.15rem;font-weight:900;
  cursor:pointer;transition:all .3s;letter-spacing:2px;position:relative;overflow:hidden;margin-top:10px}
.start-btn::before{content:'';position:absolute;top:-50%;left:-60%;width:50%;height:200%;
  background:rgba(255,255,255,.1);transform:skewX(-20deg);transition:left .5s}
.start-btn:hover::before{left:130%}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 15px 42px rgba(233,69,96,.5)}

/* ── Game info ── */
.game-info{display:flex;justify-content:space-between;align-items:center;
  padding:13px 22px;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.info-badge{display:flex;align-items:center;gap:8px;font-size:.88rem}
.info-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--accent)}50%{box-shadow:0 0 18px var(--accent),0 0 30px var(--accent)}}
.stats{display:flex;gap:18px}
.stat{text-align:center}
.stat-num{font-size:1.4rem;font-weight:900;display:block}
.stat-label{font-size:.66rem;color:var(--dim)}
.stat.mafia .stat-num{color:var(--accent)}
.stat.citizen .stat-num{color:#4ade80}

/* ── Game actions ── */
.game-actions{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px}
.action-btn{flex:1;min-width:110px;padding:12px 14px;border:none;border-radius:12px;cursor:pointer;
  font-family:inherit;font-size:.86rem;font-weight:700;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:6px}
.btn-back{background:rgba(255,255,255,.06);color:var(--dim);border:1px solid rgba(255,255,255,.1);flex:0 0 auto;min-width:unset;padding:12px 16px}
.btn-back:hover{background:rgba(255,255,255,.11);transform:translateY(-2px)}
.btn-reveal-all{background:linear-gradient(135deg,#6b0000,#c0392b);color:#fff}
.btn-reveal-all:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(139,0,0,.5)}
.btn-flip-back{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.09)}
.btn-flip-back:hover{background:rgba(255,255,255,.12);transform:translateY(-2px)}
.btn-reset{background:linear-gradient(135deg,#1a3a6b,#0f3460);color:#fff}
.btn-reset:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(15,52,96,.5)}
.btn-new-game{background:linear-gradient(135deg,#1a4a2a,#0e2e18);color:#fff}
.btn-new-game:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,74,42,.5)}

/* ── Cards grid ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:16px;margin-bottom:26px}

/* ── Card 3D flip ── */
.card-wrapper{aspect-ratio:2/3;perspective:1000px;cursor:pointer}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  transition:transform .72s cubic-bezier(.4,0,.2,1);border-radius:20px}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;border-radius:20px;
  backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

/* ── Card back ── */
.card-back{
  background:linear-gradient(145deg,#111628,#0a0e1f);
  border:1.5px solid rgba(100,120,255,.18);
  box-shadow:0 12px 36px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05)}
.card-back::before{content:'';position:absolute;inset:8px;border:1px solid rgba(255,255,255,.04);
  border-radius:14px;
  background:repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(255,255,255,.012) 12px,rgba(255,255,255,.012) 13px)}
.card-number{font-size:2.8rem;font-weight:900;color:var(--accent);
  text-shadow:0 0 22px var(--accent);position:relative;z-index:1;
  filter:drop-shadow(0 0 12px var(--accent));animation:numPulse 3s ease-in-out infinite}
@keyframes numPulse{0%,100%{filter:drop-shadow(0 0 8px var(--accent))}50%{filter:drop-shadow(0 0 20px var(--accent))}}
.card-back .tap-hint{font-size:.66rem;color:rgba(255,255,255,.2);margin-top:10px;position:relative;z-index:1;letter-spacing:2px}

/* ── Card front shared ── */
.card-front{transform:rotateY(180deg)}

/* ── Mafia card ── */
.card-front.mafia{
  background:radial-gradient(ellipse at 50% 0%,#2a0000 0%,#110000 50%,#0a0000 100%);
  border:1.5px solid rgba(200,0,0,.45);
  box-shadow:0 0 40px rgba(180,0,0,.35),inset 0 0 50px rgba(0,0,0,.5)}
.card-front.mafia::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 100%,rgba(140,0,0,.3) 0%,transparent 65%);pointer-events:none}

/* ── Citizen card ── */
.card-front.citizen{
  background:radial-gradient(ellipse at 50% 0%,#001f1a 0%,#000e14 50%,#000810 100%);
  border:1.5px solid rgba(0,200,120,.35);
  box-shadow:0 0 40px rgba(0,180,100,.25),inset 0 0 50px rgba(0,0,0,.5)}
.card-front.citizen::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 100%,rgba(0,120,80,.25) 0%,transparent 65%);pointer-events:none}

/* ── Character SVG wrapper ── */
.char-wrap{position:relative;z-index:2;width:72px;height:88px;animation:charFloat 3.2s ease-in-out infinite}
@keyframes charFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.char-wrap svg{width:100%;height:100%;overflow:visible}

/* eye glow pulse */
.eg{animation:eyeGlow 2s ease-in-out infinite}
@keyframes eyeGlow{0%,100%{opacity:.7}50%{opacity:1;filter:brightness(1.5)}}

/* shadow under character */
.char-shadow{width:48px;height:8px;background:rgba(0,0,0,.5);border-radius:50%;
  margin-top:-4px;z-index:2;position:relative;animation:shadowPulse 3.2s ease-in-out infinite;filter:blur(4px)}
@keyframes shadowPulse{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(.75);opacity:.3}}

/* role label */
.card-role-name{font-size:.8rem;font-weight:700;position:relative;z-index:3;margin-top:6px;letter-spacing:.5px;text-align:center;padding:0 6px}
.mafia .card-role-name{color:#ff5555;text-shadow:0 0 10px #ff0000}
.citizen .card-role-name{color:#44ff99;text-shadow:0 0 10px #00cc55}
.card-role-num{font-size:1.2rem;font-weight:900;position:relative;z-index:3;margin-top:3px}
.mafia .card-role-num{color:rgba(255,100,100,.65)}
.citizen .card-role-num{color:rgba(80,255,160,.65)}

/* mafia/citizen ambient particles on card */
.mafia-sparks,.citizen-sparks{position:absolute;inset:0;pointer-events:none;z-index:1;border-radius:18px;overflow:hidden}
.mafia-sparks::before{content:'☠';position:absolute;font-size:4.5rem;opacity:.04;bottom:-8px;right:-8px;transform:rotate(-15deg)}
.mafia-sparks::after{content:'⚡';position:absolute;font-size:2.8rem;opacity:.05;top:4px;left:4px}
.citizen-sparks::before{content:'⭐';position:absolute;font-size:3.5rem;opacity:.05;bottom:-5px;right:-5px}
.citizen-sparks::after{content:'✨';position:absolute;font-size:2.2rem;opacity:.06;top:4px;left:4px}

/* ── Reveal overlay ── */
.reveal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;
  align-items:center;justify-content:center;backdrop-filter:blur(12px)}
.reveal-overlay.show{display:flex}
.reveal-box{background:#0e0e1c;border:1px solid rgba(255,255,255,.1);border-radius:26px;padding:34px;
  max-width:480px;width:90%;max-height:85vh;overflow-y:auto;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.reveal-box h3{text-align:center;font-size:1.25rem;margin-bottom:20px;color:var(--accent2)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.summary-col h4{font-size:.86rem;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:6px}
.summary-col.mafia-col h4{color:var(--accent)}
.summary-col.citizen-col h4{color:#4ade80}
.summary-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.summary-list li{padding:6px 10px;border-radius:8px;font-size:.8rem;display:flex;align-items:center;gap:6px}
.summary-list.mafia-list li{background:rgba(233,69,96,.1);border:1px solid rgba(233,69,96,.2);color:#ff9999}
.summary-list.citizen-list li{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.14);color:#86efac}
.close-overlay{display:block;width:100%;padding:13px;margin-top:16px;background:var(--accent);
  border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .3s}
.close-overlay:hover{background:#c0392b;transform:translateY(-2px)}

/* ── Auth modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:800;
  align-items:center;justify-content:center;backdrop-filter:blur(12px)}
.modal-overlay.show{display:flex}
.modal-box{background:#0d0d1c;border:1px solid rgba(255,255,255,.1);border-radius:26px;padding:38px;
  max-width:400px;width:90%;position:relative;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.modal-box h3{text-align:center;font-size:1.45rem;margin-bottom:26px}
.modal-box h3 span{color:var(--accent2)}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:.78rem;color:var(--dim);margin-bottom:6px}
.modal-field input{width:100%;padding:12px 15px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.11);border-radius:11px;color:#fff;
  font-family:inherit;font-size:.95rem;outline:none;transition:border-color .3s}
.modal-field input:focus{border-color:var(--accent)}
.modal-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#c0392b);
  border:none;border-radius:11px;color:#fff;font-family:inherit;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .3s;margin-top:6px}
.modal-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(233,69,96,.5)}
.modal-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.modal-switch{text-align:center;margin-top:16px;font-size:.82rem;color:var(--dim)}
.modal-switch a{color:var(--accent2);cursor:pointer;text-decoration:underline}
.modal-close-btn{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.06);border:none;
  border-radius:50%;width:32px;height:32px;color:var(--dim);cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.modal-error{color:#ff6b6b;font-size:.8rem;text-align:center;margin-top:8px;min-height:16px}

/* ── History ── */
.history-list{display:flex;flex-direction:column;gap:12px}
.history-item{padding:16px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.history-meta{flex:1}
.history-group{font-weight:700;font-size:.95rem;color:var(--accent2)}
.history-date{font-size:.7rem;color:var(--dim);margin-top:3px}
.history-counts{display:flex;gap:12px;align-items:center}
.h-count{text-align:center}
.h-count span{display:block}
.h-count .n{font-size:1.25rem;font-weight:900}
.h-count .l{font-size:.62rem;color:var(--dim)}
.h-count.total .n{color:#fff}
.h-count.mafia .n{color:var(--accent)}
.h-count.citizen .n{color:#4ade80}
.empty-state{text-align:center;padding:55px 20px;color:var(--dim)}
.empty-state .icon{font-size:3.5rem;margin-bottom:14px;opacity:.3}

/* ── Toast / Particle ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);
  background:#14142a;border:1px solid rgba(255,255,255,.09);border-radius:50px;
  padding:10px 24px;font-size:.86rem;z-index:9999;transition:transform .3s ease;
  white-space:nowrap;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.particle{position:fixed;pointer-events:none;z-index:1000;font-size:1.3rem;animation:particleA 1s forwards}
@keyframes particleA{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-85px) scale(.4)}}

/* ── Responsive ── */
@media(max-width:600px){
  .cards-grid{grid-template-columns:repeat(3,1fr);gap:10px}
  .summary-grid{grid-template-columns:1fr}
  .setup-card{padding:18px 16px}
  .count-grid{gap:8px}
  .count-btn .number{font-size:1.9rem}
  .modal-box{padding:26px 20px}
  .char-wrap{width:60px;height:74px}
}
@media(max-width:400px){.cards-grid{grid-template-columns:repeat(2,1fr)}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);border-radius:3px}
</style>

<body>

<!-- Aurora -->
<div class="aurora" id="aurora"></div>
<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeAuthModal()">✕</button>
    <h3 id="authTitle">ورود به <span>مافیا</span></h3>
    <div id="loginFields">
      <div class="modal-field"><label>نام کاربری یا ایمیل</label>
        <input type="text" id="loginIdentifier" placeholder="username یا email" autocomplete="username"></div>
      <div class="modal-field"><label>رمز عبور</label>
        <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password"></div>
    </div>
    <div id="registerFields" style="display:none">
      <div class="modal-field"><label>نام کاربری</label>
        <input type="text" id="regUsername" placeholder="حداقل ۳ کاراکتر" autocomplete="username"></div>
      <div class="modal-field"><label>ایمیل</label>
        <input type="email" id="regEmail" placeholder="example@email.com" autocomplete="email"></div>
      <div class="modal-field"><label>رمز عبور</label>
        <input type="password" id="regPassword" placeholder="حداقل ۶ کاراکتر" autocomplete="new-password"></div>
    </div>
    <div class="modal-error" id="authError"></div>
    <button class="modal-submit" id="authSubmitBtn" onclick="submitAuth()">ورود</button>
    <div class="modal-switch" id="authSwitch">حساب ندارید؟ <a onclick="switchAuthMode()">ثبت‌نام کنید</a></div>
  </div>
</div>

<!-- Reveal overlay -->
<div class="reveal-overlay" id="revealOverlay">
  <div class="reveal-box">
    <h3>🎭 همه نقش‌ها</h3>
    <div id="revealContent"></div>
    <button class="close-overlay" onclick="closeOverlay()">بستن</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="container">
  <header>
    <div class="logo">مافیا</div>
    <div class="logo-sub">MAFIA · GAME</div>
  </header>

  <!-- Auth Bar -->
  <div class="auth-bar gc" id="authBar">
    <div class="user-info" id="loggedInInfo" style="display:none">
      <div class="avatar" id="userAvatar">م</div>
      <div>
        <div class="username" id="usernameDisplay">کاربر</div>
        <div class="games-count" id="gamesCountDisplay">۰ بازی ثبت‌شده</div>
      </div>
    </div>
    <div class="guest-msg" id="guestMsg">برای ذخیره تاریخچه وارد شوید</div>
    <button class="ab-btn btn-login" id="loginBtn" onclick="openAuthModal('login')">ورود</button>
    <button class="ab-btn btn-register" id="registerBtn" onclick="openAuthModal('register')">ثبت‌نام</button>
    <button class="ab-btn btn-logout" id="logoutBtn" style="display:none" onclick="logout()">خروج</button>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="showScreen('setup')">بازی جدید</button>
    <button class="nav-btn" onclick="showScreen('game')" id="gameNavBtn" style="display:none">بازی جاری</button>
    <button class="nav-btn" onclick="showScreen('history')">تاریخچه</button>
  </nav>

  <!-- ── Setup ── -->
  <div class="screen active" id="setupScreen">
    <div class="setup-card gc">
      <div class="section-title">🎯 انتخاب گروه</div>
      <div class="group-grid">
        <button class="group-btn" onclick="selectGroup('تکاور')" data-group="تکاور">
          <span class="icon">⚔️</span><span class="name">تکاور</span><span class="desc">سبک تاکتیکی</span>
        </button>
        <button class="group-btn" onclick="selectGroup('بازپرس')" data-group="بازپرس">
          <span class="icon">🔍</span><span class="name">بازپرس</span><span class="desc">سبک تحقیقاتی</span>
        </button>
        <button class="group-btn" onclick="selectGroup('نماینده')" data-group="نماینده">
          <span class="icon">🏛️</span><span class="name">نماینده</span><span class="desc">سبک سیاسی</span>
        </button>
        <button class="group-btn" onclick="selectGroup('دلخواه')" data-group="دلخواه">
          <span class="icon">✏️</span><span class="name">دلخواه</span><span class="desc">سفارشی‌سازی</span>
        </button>
      </div>

        <div class="section-title">✏️ ساخت گروه دلخواه</div>

        </div>
        <div class="custom-summary" id="customSummary" style="display:none">

          <span class="cs-mafia" id="csMafiaCount">۰ مافیا</span><span>·</span>
          <span class="cs-citizen" id="csCitizenCount">۰ شهروند</span>
        </div>
      </div>
    </div>

    <div class="setup-card gc" id="countCard" style="display:none">
      <div class="section-title">👥 تعداد بازیکنان</div>
      <div class="count-grid">
        <button class="count-btn" onclick="selectCount(10)" data-count="10">
          <span class="number">۱۰</span><span class="label">نفر</span>

        </button>

        </button>
      </div>
    </div>

    <div class="game-actions">

// ─── API ────────────────────────────────────────────────────────────────────
async function apiFetch(path, opts={}) {
  const headers={"Content-Type":"application/json"};
  if(authToken) headers["Authorization"]="Bearer "+authToken;
  try{const res=await fetch(API+path,{...opts,headers});const data=await res.json();return{ok:res.ok,status:res.status,data};}
  catch{return{ok:false,data:{error:"خطای شبکه"}};}
}

// ─── Auth ────────────────────────────────────────────────────────────────────
async function initAuth(){
  if(!authToken)return;
  const r=await apiFetch("/api/auth/me");
  if(r.ok){currentUser=r.data;renderAuthBar();}
  else{authToken=null;localStorage.removeItem("mafiaToken");}
}

function openAuthModal(mode){

  document.getElementById("authError").textContent="";

}

function closeAuthModal(){document.getElementById("authModal").classList.remove("show")}
function switchAuthMode(){authMode=authMode==="login"?"register":"login";updateAuthModalUI();document.getElementById("authError").textContent="";}

function updateAuthModalUI(){
  const isLogin=authMode==="login";
  document.getElementById("authTitle").innerHTML=isLogin?'ورود به <span>مافیا</span>':'ثبت‌نام در <span>مافیا</span>';
  document.getElementById("loginFields").style.display=isLogin?"block":"none";

  document.getElementById("authSubmitBtn").textContent=isLogin?"ورود":"ثبت‌نام";

}

async function submitAuth(){
  const btn=document.getElementById("authSubmitBtn"),errEl=document.getElementById("authError");
  errEl.textContent="";btn.disabled=true;btn.textContent="...";
  let body,path;
  if(authMode==="login"){body={identifier:document.getElementById("loginIdentifier").value.trim(),password:document.getElementById("loginPassword").value};path="/api/auth/login";}
  else{body={username:document.getElementById("regUsername").value.trim(),email:document.getElementById("regEmail").value.trim(),password:document.getElementById("regPassword").value};path="/api/auth/register";}
  const r=await apiFetch(path,{method:"POST",body:JSON.stringify(body)});
  btn.disabled=false;btn.textContent=authMode==="login"?"ورود":"ثبت‌نام";
  if(r.ok){authToken=r.data.token;currentUser=r.data.user;localStorage.setItem("mafiaToken",authToken);closeAuthModal();renderAuthBar();showToast("👋 خوش آمدید "+currentUser.username);if(document.getElementById("historyScreen").classList.contains("active"))renderHistory();}

// ─── Game Logic ───────────────────────────────────────────────────────────────
function generateCards(){
  const{count,mafiaCount,citizenCount,group}=state;
  const groupData=ROLES_DATA[group]&&ROLES_DATA[group][count];
  let cards=[];
  let mafiaVariants=[0,1,2,3].sort(()=>Math.random()-.5);
  let citizenVariants=[0,1,2,3].sort(()=>Math.random()-.5);
  let mi=0,ci=0;

  if(groupData){
    const mn=[...groupData.mafia],cn=[...groupData.citizen];
    for(let i=mn.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[mn[i],mn[j]]=[mn[j],mn[i]];}
    for(let i=cn.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cn[i],cn[j]]=[cn[j],cn[i]];}
    mn.forEach(n=>cards.push({role:"mafia",roleName:n,charVariant:mafiaVariants[mi++%4]}));
    cn.forEach(n=>cards.push({role:"citizen",roleName:n,charVariant:citizenVariants[ci++%4]}));
  } else if(state.customCards&&state.customCards.length){
    state.customCards.forEach(c=>cards.push({role:c.team,roleName:c.name,charVariant:c.team==="mafia"?mafiaVariants[mi++%4]:citizenVariants[ci++%4]}));
  } else {
    for(let i=0;i<mafiaCount;i++)cards.push({role:"mafia",roleName:"مافیا ساده",charVariant:mafiaVariants[i%4]});
    for(let i=0;i<citizenCount;i++)cards.push({role:"citizen",roleName:"شهروند ساده",charVariant:citizenVariants[i%4]});
  }
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
  const nums=Array.from({length:count},(_,i)=>i+1);
  for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]];}
  state.cards=cards.map((c,i)=>({...c,number:nums[i]}));
  state.flipped=new Set();
}

function shuffleCards(){generateCards();renderCardGrid();showToast("🎲 کارت‌ها بازنشانی شدند");}

function renderGame(){
  document.getElementById("gameGroupLabel").textContent=state.group;
  document.getElementById("statTotal").textContent=toFarsiNum(state.count);
  document.getElementById("statMafia").textContent=toFarsiNum(state.mafiaCount);
  document.getElementById("statCitizen").textContent=toFarsiNum(state.citizenCount);
  renderCardGrid();
}

function renderCardGrid(){
  const grid=document.getElementById("cardsGrid");grid.innerHTML="";
  const sorted=[...state.cards].sort((a,b)=>a.number-b.number);
  sorted.forEach(card=>{
    const wrapper=document.createElement("div");wrapper.className="card-wrapper";
    wrapper.innerHTML=buildCard(card);
    wrapper.querySelector(".card").addEventListener("click",e=>flipCard(e,card));
    grid.appendChild(wrapper);
  });
}

function buildCard(card){
  const flipped=state.flipped.has(card.number)?"flipped":"";
  const charSVG=getCharSVG(card.role,card.charVariant||0);
  const sparks=card.role==="mafia"?'<div class="mafia-sparks"></div>':'<div class="citizen-sparks"></div>';
  const delay=(card.charVariant||0)*0.4;
  return `
    <div class="card ${flipped}" data-num="${card.number}">
      <div class="card-face card-back">
        <div class="card-number">${toFarsiNum(card.number)}</div>
        <div class="tap-hint">لمس کنید</div>
      </div>
      <div class="card-face card-front ${card.role}">
        ${sparks}
        <div class="char-wrap" style="animation-delay:${delay}s">${charSVG}</div>
        <div class="char-shadow"></div>
        <div class="card-role-name">${card.roleName}</div>
        <div class="card-role-num">${toFarsiNum(card.number)}</div>
      </div>
    </div>`;
}

function flipCard(e,card){
  const num=card.number;
  if(state.flipped.has(num)){state.flipped.delete(num);}
  else{state.flipped.add(num);spawnParticle(e,card.role==="mafia"?"💀":"⭐");}
  const cardEl=document.querySelector(`[data-num="${num}"]`);
  if(cardEl){if(state.flipped.has(num))cardEl.classList.add("flipped");else cardEl.classList.remove("flipped");}
}

function revealAll(){
  const mafias=state.cards.filter(c=>c.role==="mafia").sort((a,b)=>a.number-b.number);
  const citizens=state.cards.filter(c=>c.role==="citizen").sort((a,b)=>a.number-b.number);
  document.getElementById("revealContent").innerHTML=`
    <div class="summary-grid">
      <div class="summary-col mafia-col">
        <h4>😈 مافیا (${toFarsiNum(mafias.length)} نفر)</h4>
        <ul class="summary-list mafia-list">
          ${mafias.map(c=>`<li>${ROLE_ICONS[c.roleName]||"🔴"} ${c.roleName} — شماره ${toFarsiNum(c.number)}</li>`).join("")}
        </ul>
      </div>
      <div class="summary-col citizen-col">
        <h4>😇 شهروند (${toFarsiNum(citizens.length)} نفر)</h4>
        <ul class="summary-list citizen-list">
          ${citizens.map(c=>`<li>${ROLE_ICONS[c.roleName]||"🟢"} ${c.roleName} — شماره ${toFarsiNum(c.number)}</li>`).join("")}
        </ul>
      </div>
    </div>`;
  document.getElementById("revealOverlay").classList.add("show");
}

function closeOverlay(){document.getElementById("revealOverlay").classList.remove("show");}
function flipAllBack(){state.flipped.clear();document.querySelectorAll(".card").forEach(c=>c.classList.remove("flipped"));showToast("🔄 همه کارت‌ها بسته شدند");}

function goBack(){showScreen("setup");document.getElementById("gameNavBtn").style.display="block";}

function newGame(){
  state={group:null,count:null,mafiaCount:null,citizenCount:null,cards:[],flipped:new Set(),isCustom:false,customCards:[]};
  customCardsList=[];
  document.getElementById("gameNavBtn").style.display="none";
  document.getElementById("startBtn").style.display="none";
  document.getElementById("countCard").style.display="none";
  document.getElementById("customForm").classList.remove("show");
  document.querySelectorAll(".group-btn,.count-btn").forEach(b=>b.classList.remove("selected"));
  showScreen("setup");
}

// ─── History ─────────────────────────────────────────────────────────────────
async function saveGame(){
  if(!authToken){
    const h=getLocalHistory();
    h.unshift({group:state.group,count:state.count,mafia:state.mafiaCount,citizen:state.citizenCount,date:new Date().toLocaleDateString("fa-IR",{year:"numeric",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"})});
    localStorage.setItem("mafiaHistory",JSON.stringify(h.slice(0,30)));return;
  }
  const r=await apiFetch("/api/games",{method:"POST",body:JSON.stringify({group:state.group,count:state.count,mafia:state.mafiaCount,citizen:state.citizenCount})});
  if(r.ok&&currentUser){currentUser.total_games=(currentUser.total_games||0)+1;document.getElementById("gamesCountDisplay").textContent=toFarsiNum(currentUser.total_games)+" بازی ثبت‌شده";}
}

function getLocalHistory(){try{return JSON.parse(localStorage.getItem("mafiaHistory"))||[];}catch{return[];}}

async function renderHistory(){
  const list=document.getElementById("historyList");
  if(authToken){
    list.innerHTML='<div style="text-align:center;padding:28px;color:var(--dim)">در حال بارگذاری...</div>';
    const r=await apiFetch("/api/games");
    if(r.ok){
      if(!r.data.length){list.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>هنوز بازی‌ای ثبت نشده</p></div>';return;}
      list.innerHTML=r.data.map(h=>`
        <div class="history-item gc">
          <div class="history-meta"><div class="history-group">${h.group}</div><div class="history-date">${h.date}</div></div>
          <div class="history-counts">
            <div class="h-count total"><span class="n">${toFarsiNum(h.count)}</span><span class="l">نفر</span></div>
            <div class="h-count mafia"><span class="n">${toFarsiNum(h.mafia)}</span><span class="l">مافیا</span></div>
            <div class="h-count citizen"><span class="n">${toFarsiNum(h.citizen)}</span><span class="l">شهروند</span></div>
          </div>
        </div>`).join("");return;
    }
  }
  const history=getLocalHistory();
  if(!history.length){list.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>هنوز بازی‌ای ثبت نشده</p></div>';return;}
  list.innerHTML=history.map(h=>`
    <div class="history-item gc">
      <div class="history-meta"><div class="history-group">${h.group}</div><div class="history-date">${h.date}</div></div>
      <div class="history-counts">
        <div class="h-count total"><span class="n">${toFarsiNum(h.count)}</span><span class="l">نفر</span></div>
        <div class="h-count mafia"><span class="n">${toFarsiNum(h.mafia)}</span><span class="l">مافیا</span></div>
        <div class="h-count citizen"><span class="n">${toFarsiNum(h.citizen)}</span><span class="l">شهروند</span></div>
      </div>
    </div>`).join("");
}

async function clearHistory(){
  if(!confirm("تاریخچه پاک شود؟"))return;
  if(authToken){await apiFetch("/api/games",{method:"DELETE"});if(currentUser){currentUser.total_games=0;document.getElementById("gamesCountDisplay").textContent="۰ بازی ثبت‌شده";}}
  else{localStorage.removeItem("mafiaHistory");}
  renderHistory();showToast("🗑️ تاریخچه پاک شد");
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function toFarsiNum(n){return String(n).replace(/\d/g,d=>"۰۱۲۳۴۵۶۷۸۹"[d]);}

function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2600);
}

function spawnParticle(e,icon){
  if(!e||!e.clientX)return;
  const p=document.createElement("div");p.className="particle";p.textContent=icon;
  p.style.left=e.clientX+"px";p.style.top=e.clientY+"px";
  document.body.appendChild(p);setTimeout(()=>p.remove(),1000);
}

document.getElementById("revealOverlay").addEventListener("click",function(e){if(e.target===this)closeOverlay();});
document.getElementById("authModal").addEventListener("click",function(e){if(e.target===this)closeAuthModal();});

initAuth();
</script>
